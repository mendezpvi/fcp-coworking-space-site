<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>We Barely Work</title>
  <link rel="stylesheet" href="./index.css">
</head>
<body>
  <header>
    <nav class="container">
      <a href="#" class="logo">WeBarelyWork
        <img src="./assets/icon/pin.png" alt="" class="icon">
      </a>
      <img src="./assets/icon/burger.png" alt="" class="icon">
    </nav>
  </header>

  <main>
    <section class="container">
      <h1>The best coworking spaces for lazy devs.</h1>
    </section>

    <div>
      <figure>
        <img src="./assets/image/hygge.webp" alt="" class="section-img">
        <figcaption class="container">
          <p>Skiving in Scandinavia? Relax with a latte at Hygge Lounge.</p>
          <button type="button">Book</button>
        </figcaption>
        <div>Exclusive</div>
      </figure>

      <figure>
        <img src="./assets/image/sky-garden.webp" alt="" class="section-img">
        <figcaption class="container">
          <p>Bored in Barcelona? Take a siesta at the Sky Garden.</p>
          <button type="button">Book</button>
        </figcaption>
      </figure>

      <figure>
        <img src="./assets/image/generator.webp" alt="" class="section-img">
        <figcaption class="container">
          <p>Relaxing in Rio? Take some downtime at the Generator Hub.</p>
          <button type="button">Book</button>
        </figcaption>
      </figure>
    </div>
  </main>

  <div class="bubble">
    <img src="./assets/icon/message.png" alt="" class="icon">
  </div>
</body>
</html>
